<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - SAVX</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/cart.css">
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="index.html" class="logo">SAVX</a>
            <button class="mobile-menu-btn" id="menu-btn">
    <i class="ri-menu-line"></i>
</button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="track-order.html">Track Order</a></li>
                <li>
                    <a href="cart.html" class="cart-link">
                        <i class="ri-shopping-cart-line"></i>
                        <span class="cart-count">0</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="cart-container">
        <h1 class="cart-header">Your Shopping Cart</h1>
        
        <div class="cart-items" id="cart-items">
            <!-- Cart items will be dynamically inserted here -->
            <div class="empty-cart">
                <i class="ri-shopping-cart-line"></i>
                <p>Your cart is empty</p>
                <a href="products.html" class="btn">Continue Shopping</a>
            </div>
        </div>
        
        <div class="cart-summary">
            <h2>Order Summary</h2>
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">EGP 0.00</span>
            </div>
            <div class="summary-row">
                <span>Shipping</span>
                <span>Free</span>
            </div>
            <div class="summary-row summary-total">
                <span>Total</span>
                <span id="total">EGP 0.00</span>
            </div>
            <button class="checkout-btn" id="proceed-to-checkout" onclick="">Proceed to Checkout</button>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="assets/js/footer.js"></script>
<script>
        // This will be replaced with dynamic cart functionality
        function updateCart() {
            // Will be implemented in the main JavaScript
        }
        
        // Initialize cart
        document.addEventListener('DOMContentLoaded', () => {
            updateCart();
        });
    </script>
    <script type="module" src="assets/js/app.js"></script>
   
<script type="module" src="assets/js/cart.js"></script>
</body>
</html>
